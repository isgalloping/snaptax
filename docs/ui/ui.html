<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BlueCollar Tax Helper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 消除移动端点击蓝色高亮，提升原生 App 感 */
        * { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-black text-white font-sans h-screen flex flex-col justify-between overflow-hidden select-none">

<header class="p-6 bg-zinc-900 border-b-4 border-yellow-500 flex justify-between items-center">
    <div>
        <p class="text-xs uppercase tracking-widest text-zinc-400 font-bold">Est. Tax Saved</p>
        <p class="text-4xl font-extrabold text-yellow-400 mt-1">$1,420.50</p>
    </div>
    <button class="w-14 h-14 bg-zinc-800 border-2 border-zinc-600 rounded-xl flex items-center justify-center active:scale-95 transition-transform" aria-label="Settings">
        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 6h9.75M10.5 6a1.5 1.5 0 11-3 0m3 0a1.5 1.5 0 10-3 0M3.75 6H7.5m3 12h9.75m-9.75 0a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m-3.75 0H7.5m9-6h3.75m-3.75 0a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m-9.75 0h9.75"></path>
        </svg>
    </button>
</header>

<main class="flex-1 flex flex-col items-center justify-center px-6">
    <label class="w-full max-w-sm aspect-square bg-yellow-500 rounded-3xl flex flex-col items-center justify-center text-black cursor-pointer shadow-2xl active:bg-yellow-400 active:scale-95 transition-all border-8 border-white">
        <input type="file" accept="image/*" capture="environment" class="hidden" onchange="alert('照片已安全暂存，正在后台分类...')">

        <svg class="w-24 h-24 stroke-[2.5]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0 2.192 2.192 0 00-1.736 1.039l-.821 1.316z"></path>
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0zM18.75 10.5h.008v.008h-.008V10.5z"></path>
        </svg>

        <span class="text-2xl font-black uppercase tracking-wider mt-4">SNAP RECEIPT</span>
        <span class="text-xs font-bold opacity-80 mt-1">拍小票 (自动归类)</span>
    </label>
</main>

<footer class="p-6 bg-zinc-900 rounded-t-3xl border-t-2 border-zinc-850 max-h-[35vh] flex flex-col">
    <div class="flex justify-between items-center mb-4">
        <h2 class="text-sm font-bold uppercase tracking-wider text-zinc-400">Recent Receipts</h2>
        <span class="flex items-center text-xs text-green-400 font-bold bg-green-950 px-2 py-1 rounded-full">
        <span class="w-2 h-2 bg-green-400 rounded-full mr-1.5 animate-pulse"></span> Ready / Online
      </span>
    </div>

    <div class="flex-1 overflow-y-auto space-y-3 pr-1">

        <div class="bg-zinc-800 p-4 rounded-xl flex justify-between items-center border-l-4 border-yellow-500">
            <div>
                <p class="font-extrabold text-lg text-yellow-500">Processing...</p>
                <p class="text-xs text-zinc-400 mt-0.5">Just now · Home Depot</p>
            </div>
            <div class="text-right">
                <span class="text-xs font-bold bg-yellow-950 text-yellow-400 px-2.5 py-1 rounded border border-yellow-800 uppercase tracking-wider">Uploading</span>
            </div>
        </div>

        <div class="bg-zinc-800 p-4 rounded-xl flex justify-between items-center border-l-4 border-zinc-600">
            <div>
                <p class="font-extrabold text-lg text-white">$45.20</p>
                <p class="text-xs text-zinc-400 mt-0.5">Today, 11:30 AM · Shell Gas</p>
            </div>
            <div class="text-right">
                <span class="text-sm font-black text-black bg-white px-3 py-1 rounded uppercase tracking-wide">Truck Gas</span>
            </div>
        </div>

        <div class="bg-zinc-800 p-4 rounded-xl flex justify-between items-center border-l-4 border-zinc-600">
            <div>
                <p class="font-extrabold text-lg text-white">$120.00</p>
                <p class="text-xs text-zinc-400 mt-0.5">Yesterday · Lowes Supplies</p>
            </div>
            <div class="text-right">
                <span class="text-sm font-black text-black bg-white px-3 py-1 rounded uppercase tracking-wide">Tools</span>
            </div>
        </div>

    </div>
</footer>

</body>
</html>
